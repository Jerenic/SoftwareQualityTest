name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Spotless + unit tests
        run: ./gradlew --no-daemon clean spotlessCheck test

      - name: Postgres integration test (Testcontainers)
        run: ./gradlew --no-daemon test -DrunPostgresIntegration=true
