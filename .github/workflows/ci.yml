name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: Spotless + unit tests
        run: ./gradlew --no-daemon clean spotlessCheck checkstyleMain pmdMain spotbugsMain test

      - name: Postgres integration test (Testcontainers)
        run: ./gradlew --no-daemon test -DrunPostgresIntegration=true

      - name: Run Hadolint (Dockerfile lint)
        if: ${{ hashFiles('Dockerfile') != '' }}
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
